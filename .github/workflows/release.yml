name: Release

# Publishes CCStash to NuGet.org via Trusted Publishing (OIDC — no long-lived API key).
# Cut tags from a green main (CI runs the full test suite on every push/PR to main).
#
#   git tag v0.1.6 && git push origin v0.1.6
#
# Use the manual "Run workflow" button (workflow_dispatch) to pack + smoke-test only (push=false),
# or to publish on demand (push=true).
#
# Trusted Publishing setup (nuget.org -> your username -> Trusted Publishing):
#   Repository Owner: <your GitHub owner>
#   Repository:       claude-vector-context-stash
#   Workflow File:    release.yml          (filename only, no path)
#   Environment:      nuget                (must match `environment:` on the publish job below)
# Also add a repository secret NUGET_USER = your nuget.org profile name (not your email).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to NuGet.org (otherwise pack + smoke-test only)'
        type: boolean
        default: false

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # For a tag build, override the package version from the tag (v0.1.6 -> 0.1.6) so the
      # artifact always matches the tag. For a manual run, fall back to the csproj <Version>.
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "arg=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # Pack without --no-build: PackAsTool publishes the project as part of packing, and
      # --no-build can skip that publish and pack stale output. Letting pack publish also runs the
      # TrimUnusedNativeRuntimes target that prunes mobile/web native libraries.
      - name: Pack
        run: dotnet pack src/CCStash/CCStash.csproj -c Release -o artifacts ${{ steps.ver.outputs.arg }}

      - name: Report package size
        run: ls -lh artifacts/*.nupkg

      # Install the freshly packed tool from the LOCAL artifacts feed (not NuGet.org, which has
      # indexing lag) and run it. This proves the package installs and that the kept linux-x64
      # native libraries (onnxruntime + e_sqlite3) load — `status` opens the SQLite store.
      - name: Smoke-test the packaged tool via the local feed
        run: |
          dotnet tool install --tool-path ./_smoke --add-source ./artifacts CCStash
          ./_smoke/ccstash status
          ./_smoke/ccstash gc --dry-run

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

  publish:
    needs: pack
    # Only publish for a version tag, or a manual run with push=true.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.push
    runs-on: ubuntu-latest
    # Gate publishing behind the protected `nuget` environment; this name must match the
    # Environment field of the NuGet Trusted Publishing policy.
    environment: nuget
    permissions:
      id-token: write   # request the GitHub OIDC token for trusted publishing
      contents: read
    steps:
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: artifacts

      # Exchange the GitHub OIDC token for a short-lived NuGet API key (valid ~1 hour).
      - name: NuGet login (OIDC -> temporary API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
